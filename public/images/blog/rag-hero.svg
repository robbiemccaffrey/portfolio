<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/><line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Glow effects -->
  <ellipse cx="350" cy="350" rx="250" ry="200" fill="#3b82f6" opacity="0.03"/>
  <ellipse cx="850" cy="300" rx="250" ry="200" fill="#8b5cf6" opacity="0.03"/>

  <!-- Connection lines between pipeline stages -->
  <g opacity="0.6">
    <!-- Documents to Chunks -->
    <line x1="228" y1="350" x2="330" y2="350" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
    <!-- Chunks to Vector Store -->
    <line x1="468" y1="350" x2="530" y2="350" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
    <!-- Vector Store to LLM -->
    <line x1="668" y1="350" x2="730" y2="350" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
    <!-- LLM to Response -->
    <line x1="868" y1="350" x2="940" y2="350" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
  </g>

  <!-- Arrow heads -->
  <g fill="#475569" opacity="0.6">
    <polygon points="330,345 320,350 330,355"/>
    <polygon points="530,345 520,350 530,355"/>
    <polygon points="730,345 720,350 730,355"/>
    <polygon points="940,345 930,350 940,355"/>
  </g>

  <!-- Stage 1: Documents -->
  <g filter="url(#shadow)">
    <rect x="90" y="300" width="138" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Document icon -->
    <g transform="translate(140, 330)">
      <rect x="-12" y="-14" width="24" height="30" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="-6" y1="-6" x2="6" y2="-6" stroke="#3b82f6" stroke-width="1.2" opacity="0.6"/>
      <line x1="-6" y1="-1" x2="6" y2="-1" stroke="#3b82f6" stroke-width="1.2" opacity="0.6"/>
      <line x1="-6" y1="4" x2="3" y2="4" stroke="#3b82f6" stroke-width="1.2" opacity="0.6"/>
      <line x1="-6" y1="9" x2="6" y2="9" stroke="#3b82f6" stroke-width="1.2" opacity="0.6"/>
    </g>
    <text x="159" y="380" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle" font-weight="500">Documents</text>
  </g>

  <!-- Stage 2: Chunks + Embeddings -->
  <g filter="url(#shadow)">
    <rect x="330" y="300" width="138" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Grid/chunks icon -->
    <g transform="translate(399, 330)">
      <rect x="-16" y="-12" width="12" height="10" rx="2" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
      <rect x="2" y="-12" width="12" height="10" rx="2" fill="#3b82f6" opacity="0.5" stroke="#3b82f6" stroke-width="1"/>
      <rect x="-16" y="2" width="12" height="10" rx="2" fill="#3b82f6" opacity="0.7" stroke="#3b82f6" stroke-width="1"/>
      <rect x="2" y="2" width="12" height="10" rx="2" fill="#3b82f6" opacity="0.4" stroke="#3b82f6" stroke-width="1"/>
    </g>
    <text x="399" y="380" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle" font-weight="500">Embeddings</text>
  </g>

  <!-- Stage 3: Vector Store -->
  <g filter="url(#shadow)">
    <rect x="530" y="300" width="138" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Vector/database icon -->
    <g transform="translate(599, 328)">
      <ellipse cx="0" cy="-10" rx="16" ry="6" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="-16" y1="-10" x2="-16" y2="10" stroke="#8b5cf6" stroke-width="1.5"/>
      <line x1="16" y1="-10" x2="16" y2="10" stroke="#8b5cf6" stroke-width="1.5"/>
      <ellipse cx="0" cy="10" rx="16" ry="6" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <ellipse cx="0" cy="0" rx="16" ry="6" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
      <!-- Dots representing vectors -->
      <circle cx="-6" cy="-4" r="1.5" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="4" cy="-8" r="1.5" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="8" cy="2" r="1.5" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="-3" cy="6" r="1.5" fill="#8b5cf6" opacity="0.6"/>
    </g>
    <text x="599" y="380" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle" font-weight="500">Vector Store</text>
  </g>

  <!-- Stage 4: LLM -->
  <g filter="url(#shadow)">
    <rect x="730" y="300" width="138" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Brain/AI icon -->
    <g transform="translate(799, 330)">
      <circle cx="0" cy="0" r="14" fill="none" stroke="url(#accent2)" stroke-width="1.5"/>
      <circle cx="-5" cy="-3" r="3" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.7"/>
      <circle cx="5" cy="-3" r="3" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.7"/>
      <circle cx="0" cy="5" r="3" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.7"/>
      <line x1="-3" y1="-1" x2="3" y2="-1" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
      <line x1="-2" y1="2" x2="0" y2="3" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
      <line x1="2" y1="2" x2="0" y2="3" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
    </g>
    <text x="799" y="380" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle" font-weight="500">LLM</text>
  </g>

  <!-- Stage 5: Response -->
  <g filter="url(#shadow)">
    <rect x="940" y="300" width="138" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Chat/response icon -->
    <g transform="translate(1009, 328)">
      <rect x="-14" y="-12" width="28" height="20" rx="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <polygon points="-4,8 0,14 4,8" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <line x1="-7" y1="-5" x2="7" y2="-5" stroke="#10b981" stroke-width="1.2" opacity="0.5"/>
      <line x1="-7" y1="0" x2="4" y2="0" stroke="#10b981" stroke-width="1.2" opacity="0.5"/>
    </g>
    <text x="1009" y="380" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle" font-weight="500">Response</text>
  </g>

  <!-- Query arrow coming from above into Vector Store -->
  <g opacity="0.5">
    <line x1="599" y1="240" x2="599" y2="298" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="594,296 599,304 604,296" fill="#f59e0b" opacity="0.5"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="550" y="210" width="98" height="34" rx="17" fill="#1e293b" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
    <text x="599" y="232" fill="#f59e0b" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle" font-weight="500">Query</text>
  </g>

  <!-- Title text -->
  <text x="600" y="130" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="42" text-anchor="middle" font-weight="700" letter-spacing="-1">Building RAG From Scratch</text>
  <text x="600" y="170" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle" font-weight="400">Embeddings, chunking, vector stores, and the retrieval pipeline</text>

  <!-- Subtle decorative elements -->
  <g opacity="0.06">
    <!-- Floating dots -->
    <circle cx="100" cy="150" r="3" fill="#3b82f6"/>
    <circle cx="180" cy="200" r="2" fill="#8b5cf6"/>
    <circle cx="1050" cy="180" r="2.5" fill="#3b82f6"/>
    <circle cx="1100" cy="140" r="2" fill="#ec4899"/>
    <circle cx="80" cy="500" r="2.5" fill="#8b5cf6"/>
    <circle cx="1120" cy="480" r="3" fill="#3b82f6"/>
    <circle cx="300" cy="500" r="2" fill="#10b981"/>
    <circle cx="900" cy="500" r="2" fill="#f59e0b"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#0f172a"/>
  <text x="600" y="620" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">robertmccaffrey.ie</text>
</svg>